<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FinSight — Personal Finance Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface2: #1a2235;
    --border: rgba(255,255,255,0.07);
    --accent: #00e5b4;
    --accent2: #ff6b6b;
    --accent3: #ffd166;
    --accent4: #6c9fff;
    --text: #e8eaf0;
    --muted: #6b7280;
    --card-glow: rgba(0,229,180,0.08);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Subtle grid bg */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    pointer-events: none;
    z-index: 0;
  }
  .orb1 { width: 400px; height: 400px; background: rgba(0,229,180,0.08); top: -100px; right: -100px; }
  .orb2 { width: 300px; height: 300px; background: rgba(108,159,255,0.06); bottom: 100px; left: -80px; }

  .shell { position: relative; z-index: 1; max-width: 1200px; margin: 0 auto; padding: 0 24px 60px; }

  /* HEADER */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 32px 0 40px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 40px;
  }

  .logo {
    font-family: 'DM Serif Display', serif;
    font-size: 28px;
    letter-spacing: -0.5px;
    color: var(--text);
  }
  .logo span { color: var(--accent); }

  .header-right {
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .month-badge {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 6px 14px;
    border-radius: 20px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .upload-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--accent);
    color: #0a0e1a;
    border: none;
    padding: 10px 20px;
    border-radius: 8px;
    font-family: 'Outfit', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .upload-btn:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(0,229,180,0.3); }
  #csv-input { display: none; }

  /* KPI CARDS */
  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 32px;
  }

  .kpi-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.3s, transform 0.2s;
    animation: fadeUp 0.5s ease both;
  }
  .kpi-card:hover { border-color: rgba(0,229,180,0.3); transform: translateY(-2px); }
  .kpi-card::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 2px;
    border-radius: 0 0 16px 16px;
  }
  .kpi-card.green::after { background: var(--accent); }
  .kpi-card.red::after { background: var(--accent2); }
  .kpi-card.yellow::after { background: var(--accent3); }
  .kpi-card.blue::after { background: var(--accent4); }

  .kpi-card:nth-child(1) { animation-delay: 0.1s; }
  .kpi-card:nth-child(2) { animation-delay: 0.2s; }
  .kpi-card:nth-child(3) { animation-delay: 0.3s; }
  .kpi-card:nth-child(4) { animation-delay: 0.4s; }

  .kpi-label {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    font-family: 'DM Mono', monospace;
    margin-bottom: 10px;
  }

  .kpi-value {
    font-family: 'DM Serif Display', serif;
    font-size: 32px;
    color: var(--text);
    line-height: 1;
    margin-bottom: 8px;
  }

  .kpi-delta {
    font-size: 12px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .kpi-delta.up { color: var(--accent); }
  .kpi-delta.down { color: var(--accent2); }

  /* CHARTS ROW */
  .charts-row {
    display: grid;
    grid-template-columns: 1.6fr 1fr;
    gap: 16px;
    margin-bottom: 16px;
  }

  .chart-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    animation: fadeUp 0.5s ease 0.5s both;
  }

  .card-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    font-family: 'DM Mono', monospace;
    margin-bottom: 24px;
  }

  /* BOTTOM ROW */
  .bottom-row {
    display: grid;
    grid-template-columns: 1fr 1.2fr;
    gap: 16px;
    margin-bottom: 16px;
  }

  /* CATEGORY LIST */
  .category-list { list-style: none; }
  .category-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
    animation: fadeUp 0.4s ease both;
  }
  .category-item:last-child { border-bottom: none; }

  .cat-left { display: flex; align-items: center; gap: 12px; }
  .cat-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .cat-name { font-size: 14px; font-weight: 500; }
  .cat-bar-wrap { flex: 1; margin: 0 16px; height: 4px; background: var(--surface2); border-radius: 4px; overflow: hidden; }
  .cat-bar { height: 100%; border-radius: 4px; transition: width 1s ease; }
  .cat-amount { font-family: 'DM Mono', monospace; font-size: 13px; color: var(--text); }
  .cat-pct { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); margin-left: 8px; }

  /* INSIGHT BOX */
  .insight-box {
    background: var(--surface2);
    border: 1px solid rgba(0,229,180,0.2);
    border-radius: 12px;
    padding: 16px 20px;
    margin-bottom: 16px;
    display: flex;
    align-items: flex-start;
    gap: 14px;
    animation: fadeUp 0.5s ease 0.7s both;
  }

  .insight-icon {
    font-size: 20px;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .insight-text {
    font-size: 13px;
    line-height: 1.6;
    color: var(--text);
  }

  .insight-text strong { color: var(--accent); }

  /* TRANSACTIONS TABLE */
  .txn-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    animation: fadeUp 0.5s ease 0.6s both;
  }

  .txn-table { width: 100%; border-collapse: collapse; }
  .txn-table th {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    text-align: left;
    padding: 0 0 14px;
    border-bottom: 1px solid var(--border);
  }
  .txn-table td {
    padding: 12px 0;
    font-size: 13px;
    border-bottom: 1px solid rgba(255,255,255,0.03);
    vertical-align: middle;
  }
  .txn-table tr:last-child td { border-bottom: none; }

  .txn-cat-badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 500;
    font-family: 'DM Mono', monospace;
  }

  .txn-amount { font-family: 'DM Mono', monospace; font-weight: 500; }
  .txn-amount.debit { color: var(--accent2); }
  .txn-amount.credit { color: var(--accent); }

  .txn-date { color: var(--muted); font-family: 'DM Mono', monospace; font-size: 11px; }

  /* UPLOAD STATE */
  .upload-prompt {
    text-align: center;
    padding: 60px 20px;
    border: 2px dashed var(--border);
    border-radius: 16px;
    cursor: pointer;
    transition: border-color 0.3s, background 0.3s;
    margin-bottom: 16px;
  }
  .upload-prompt:hover { border-color: var(--accent); background: rgba(0,229,180,0.03); }
  .upload-prompt h3 { font-family: 'DM Serif Display', serif; font-size: 22px; margin-bottom: 8px; }
  .upload-prompt p { color: var(--muted); font-size: 14px; margin-bottom: 20px; }

  .sample-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 24px;
    border-radius: 8px;
    font-family: 'Outfit', sans-serif;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s;
    margin-right: 8px;
  }
  .sample-btn:hover { border-color: var(--accent); color: var(--accent); }

  .dashboard-section { display: none; }
  .dashboard-section.active { display: block; }

  /* ANIMATIONS */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  canvas { max-height: 240px; }

  /* Responsive */
  @media (max-width: 900px) {
    .kpi-grid { grid-template-columns: repeat(2, 1fr); }
    .charts-row, .bottom-row { grid-template-columns: 1fr; }
  }
  @media (max-width: 500px) {
    .kpi-grid { grid-template-columns: 1fr; }
    header { flex-direction: column; gap: 16px; align-items: flex-start; }
  }

  .section-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }
</style>
</head>
<body>

<div class="orb orb1"></div>
<div class="orb orb2"></div>

<div class="shell">
  <header>
    <div class="logo">Fin<span>Sight</span></div>
    <div class="header-right">
      <div class="month-badge" id="month-label">— / —</div>
      <button class="upload-btn" onclick="document.getElementById('csv-input').click()">
        ↑ Upload CSV
      </button>
      <input type="file" id="csv-input" accept=".csv" onchange="handleCSV(event)">
    </div>
  </header>

  <!-- UPLOAD PROMPT -->
  <div id="upload-section" class="upload-prompt" onclick="document.getElementById('csv-input').click()">
    <div style="font-size:48px;margin-bottom:16px;">📊</div>
    <h3>Drop your bank statement CSV</h3>
    <p>Columns needed: Date, Description, Amount, Category<br>Or try the sample data to see how it works</p>
    <button class="sample-btn" onclick="event.stopPropagation(); loadSample()">Load Sample Data</button>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard-section" class="dashboard-section">

    <!-- KPI CARDS -->
    <div class="section-label">Overview</div>
    <div class="kpi-grid" id="kpi-grid"></div>

    <!-- AI INSIGHTS -->
    <div class="section-label">AI Insights</div>
    <div id="insights-container"></div>

    <!-- CHARTS -->
    <div class="section-label">Spending Trends</div>
    <div class="charts-row">
      <div class="chart-card">
        <div class="card-title">Monthly Spending</div>
        <canvas id="lineChart"></canvas>
      </div>
      <div class="chart-card">
        <div class="card-title">By Category</div>
        <canvas id="donutChart"></canvas>
      </div>
    </div>

    <!-- BOTTOM ROW -->
    <div class="bottom-row">
      <div class="chart-card">
        <div class="card-title">Category Breakdown</div>
        <ul class="category-list" id="cat-list"></ul>
      </div>
      <div class="txn-card">
        <div class="card-title">Recent Transactions</div>
        <table class="txn-table">
          <thead>
            <tr>
              <th>Date</th>
              <th>Description</th>
              <th>Category</th>
              <th style="text-align:right">Amount</th>
            </tr>
          </thead>
          <tbody id="txn-body"></tbody>
        </table>
      </div>
    </div>

  </div>
</div>

<script>
const CATEGORY_COLORS = {
  'Food': '#00e5b4',
  'Transport': '#6c9fff',
  'Shopping': '#ff6b6b',
  'Entertainment': '#ffd166',
  'Health': '#a78bfa',
  'Utilities': '#fb923c',
  'Education': '#34d399',
  'Income': '#00e5b4',
  'Other': '#9ca3af'
};

const CAT_BG = {
  'Food': 'rgba(0,229,180,0.12)',
  'Transport': 'rgba(108,159,255,0.12)',
  'Shopping': 'rgba(255,107,107,0.12)',
  'Entertainment': 'rgba(255,209,102,0.12)',
  'Health': 'rgba(167,139,250,0.12)',
  'Utilities': 'rgba(251,146,60,0.12)',
  'Education': 'rgba(52,211,153,0.12)',
  'Income': 'rgba(0,229,180,0.12)',
  'Other': 'rgba(156,163,175,0.12)'
};

// --- SAMPLE DATA ---
function generateSample() {
  const cats = ['Food','Transport','Shopping','Entertainment','Health','Utilities','Education'];
  const descs = {
    Food: ['Zomato Order','Swiggy Dinner','Big Bazaar Groceries','McDonald\'s','Cafe Coffee Day','DMart'],
    Transport: ['Uber Ride','Ola Auto','Metro Card Recharge','Rapido Bike','IRCTC Train Ticket'],
    Shopping: ['Amazon Purchase','Flipkart Order','H&M Clothes','Myntra Haul','Croma Electronics'],
    Entertainment: ['Netflix Subscription','Spotify Premium','BookMyShow Movie','Steam Game'],
    Health: ['Apollo Pharmacy','Gym Membership','Practo Consultation','MedPlus'],
    Utilities: ['Airtel Recharge','Electricity Bill','JioBroadband','Water Bill'],
    Education: ['Coursera Course','Udemy Bootcamp','Book Purchase','Notion Pro']
  };
  const rows = [{ Date:'2024-03-01', Description:'Salary Credit', Amount: 45000, Category:'Income' }];
  for (let i = 0; i < 45; i++) {
    const cat = cats[Math.floor(Math.random() * cats.length)];
    const d = descs[cat];
    const desc = d[Math.floor(Math.random() * d.length)];
    const day = String(Math.floor(Math.random() * 28) + 1).padStart(2, '0');
    const month = Math.random() > 0.35 ? '2024-03' : '2024-02';
    const amt = -(Math.floor(Math.random() * 2800) + 80);
    rows.push({ Date: `${month}-${day}`, Description: desc, Amount: amt, Category: cat });
  }
  rows.push({ Date:'2024-02-01', Description:'Salary Credit', Amount: 45000, Category:'Income' });
  return rows;
}

function loadSample() { processData(generateSample()); }

// --- CSV PARSER (bulletproof) ---
function parseCSVLine(line) {
  const result = [];
  let cur = '', inQuotes = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (ch === '"') {
      if (inQuotes && line[i+1] === '"') { cur += '"'; i++; }
      else inQuotes = !inQuotes;
    } else if (ch === ',' && !inQuotes) {
      result.push(cur.trim()); cur = '';
    } else cur += ch;
  }
  result.push(cur.trim());
  return result;
}

function smartMap(headers) {
  // Fuzzy-match common column name variants
  const find = (patterns) => {
    const h = headers.map(x => x.toLowerCase().replace(/[^a-z0-9]/g,''));
    for (const p of patterns) {
      const idx = h.findIndex(x => x.includes(p));
      if (idx !== -1) return idx;
    }
    return -1;
  };
  return {
    date:   find(['date','time','txndate','transactiondate','valuedate','postdate']),
    desc:   find(['desc','narration','particulars','detail','remark','name','note','merchant','transaction']),
    amount: find(['amount','amt','debit','credit','sum','inr','rs','value']),
    debit:  find(['debit','dr','withdrawal','debitamt']),
    credit: find(['credit','cr','deposit','creditamt']),
    cat:    find(['category','cat','type','label','tag']),
  };
}

function guessCategory(desc) {
  if (!desc) return 'Other';
  const d = desc.toLowerCase();
  if (/zomato|swiggy|domino|mcdonald|kfc|pizza|burger|cafe|restaurant|food|grocer|bigbasket|dmart|zepto|blinkit|instamart/.test(d)) return 'Food';
  if (/uber|ola|rapido|metro|irctc|train|bus|fuel|petrol|diesel|parking|toll|cab|auto|taxi/.test(d)) return 'Transport';
  if (/amazon|flipkart|myntra|ajio|meesho|nykaa|shop|mall|store|market|h&m|zara/.test(d)) return 'Shopping';
  if (/netflix|spotify|hotstar|prime|youtube|bookmyshow|cinema|movie|game|steam|play/.test(d)) return 'Entertainment';
  if (/hospital|pharmacy|medplus|apollo|clinic|doctor|health|gym|fitness|medicine/.test(d)) return 'Health';
  if (/airtel|jio|bsnl|vodafone|electricity|water|gas|broadband|recharge|bill|utility/.test(d)) return 'Utilities';
  if (/coursera|udemy|college|university|school|book|course|education|tuition|fee/.test(d)) return 'Education';
  if (/salary|credit|income|bonus|refund|reward|cashback|interest|dividend/.test(d)) return 'Income';
  return 'Other';
}

function parseDate(str) {
  if (!str) return null;
  str = str.trim().replace(/"/g,'');
  // Try common formats: DD/MM/YYYY, MM/DD/YYYY, YYYY-MM-DD, DD-MM-YYYY, DD MMM YYYY
  let d;
  // ISO
  if (/^\d{4}-\d{2}-\d{2}/.test(str)) d = new Date(str);
  // DD/MM/YYYY or DD-MM-YYYY
  else if (/^\d{2}[\/\-]\d{2}[\/\-]\d{4}/.test(str)) {
    const [day,mon,yr] = str.split(/[\/\-]/);
    d = new Date(`${yr}-${mon}-${day}`);
  }
  // MM/DD/YYYY
  else if (/^\d{1,2}\/\d{1,2}\/\d{4}/.test(str)) d = new Date(str);
  // DD MMM YYYY
  else d = new Date(str);
  if (isNaN(d)) return null;
  const y = d.getFullYear(), mo = String(d.getMonth()+1).padStart(2,'0'), dy = String(d.getDate()).padStart(2,'0');
  return `${y}-${mo}-${dy}`;
}

function handleCSV(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const raw = ev.target.result;
      const lines = raw.split(/\r?\n/).filter(l => l.trim() && !l.match(/^,+$/));
      if (lines.length < 2) { alert('CSV seems empty or invalid.'); return; }

      const headers = parseCSVLine(lines[0]).map(h => h.replace(/"/g,'').trim());
      const map = smartMap(headers);

      // Fallback: if no date col found, try first col
      if (map.date === -1) map.date = 0;

      const rows = [];
      for (let i = 1; i < lines.length; i++) {
        const vals = parseCSVLine(lines[i]);
        if (!vals.length || vals.every(v => !v)) continue;

        const get = (idx) => idx !== -1 && idx < vals.length ? vals[idx].replace(/"/g,'').replace(/,/g,'').trim() : '';

        const dateStr = parseDate(get(map.date));
        if (!dateStr) continue;

        let amount = null;
        if (map.amount !== -1) {
          // Single amount column — negative = expense
          const raw = get(map.amount).replace(/[₹$£€\s,]/g,'');
          amount = parseFloat(raw);
        } else if (map.debit !== -1 || map.credit !== -1) {
          // Separate debit/credit columns
          const deb = parseFloat(get(map.debit).replace(/[₹$£€\s,]/g,'') || '0') || 0;
          const cred = parseFloat(get(map.credit).replace(/[₹$£€\s,]/g,'') || '0') || 0;
          if (cred > 0) amount = cred;
          else if (deb > 0) amount = -deb;
          else continue;
        }

        if (amount === null || isNaN(amount)) continue;

        const desc = get(map.desc) || get(1) || 'Transaction';
        const cat = map.cat !== -1 && get(map.cat) ? get(map.cat) : guessCategory(desc);

        rows.push({ Date: dateStr, Description: desc, Amount: amount, Category: cat });
      }

      if (rows.length === 0) {
        alert('Could not read any transactions. Make sure your CSV has Date and Amount columns.');
        return;
      }

      processData(rows);
    } catch(err) {
      alert('Error reading file. Please check the format and try again.\n\n' + err.message);
      console.error(err);
    }
  };
  reader.readAsText(file);
}

// --- CORE ---
let lineChartInst, donutChartInst;

function processData(rows) {
  document.getElementById('upload-section').style.display = 'none';
  document.getElementById('dashboard-section').classList.add('active');

  // Sort
  rows.sort((a,b) => new Date(a.Date) - new Date(b.Date));

  // Detect current month (latest)
  const dates = rows.map(r => r.Date).filter(Boolean);
  const latest = dates[dates.length - 1];
  const [y, m] = latest.split('-');
  const monthName = new Date(y, m-1).toLocaleString('default', { month: 'long', year: 'numeric' });
  document.getElementById('month-label').textContent = monthName;

  const currentRows = rows.filter(r => r.Date && r.Date.startsWith(`${y}-${m}`));
  const prevMonth = m === '01' ? `${y-1}-12` : `${y}-${String(m-1).padStart(2,'0')}`;
  const prevRows = rows.filter(r => r.Date && r.Date.startsWith(prevMonth));

  // KPIs
  const income = currentRows.filter(r => r.Amount > 0).reduce((s,r) => s + r.Amount, 0);
  const expenses = Math.abs(currentRows.filter(r => r.Amount < 0).reduce((s,r) => s + r.Amount, 0));
  const savings = income - expenses;
  const savingsPct = income > 0 ? ((savings / income) * 100).toFixed(1) : 0;

  const prevExp = Math.abs(prevRows.filter(r => r.Amount < 0).reduce((s,r) => s + r.Amount, 0));
  const expDelta = prevExp > 0 ? (((expenses - prevExp) / prevExp) * 100).toFixed(1) : 0;

  renderKPIs(income, expenses, savings, savingsPct, expDelta);

  // Category breakdown (current month expenses)
  const catMap = {};
  currentRows.filter(r => r.Amount < 0).forEach(r => {
    const cat = r.Category || 'Other';
    catMap[cat] = (catMap[cat] || 0) + Math.abs(r.Amount);
  });

  renderDonut(catMap);
  renderCatList(catMap, expenses);
  renderInsights(catMap, expenses, savingsPct, expDelta, prevRows, currentRows);
  renderTransactions(currentRows);
  renderLine(rows, y, m);
}

function fmt(n) {
  return '₹' + Math.round(n).toLocaleString('en-IN');
}

function renderKPIs(income, expenses, savings, savingsPct, expDelta) {
  const grid = document.getElementById('kpi-grid');
  const items = [
    { label: 'Total Income', value: fmt(income), delta: 'This month', cls: 'green', icon: '↑' },
    { label: 'Total Expenses', value: fmt(expenses), delta: (expDelta > 0 ? '▲' : '▼') + ' ' + Math.abs(expDelta) + '% vs last month', cls: expDelta > 0 ? 'red' : 'green', deltaClass: expDelta > 0 ? 'down' : 'up' },
    { label: 'Net Savings', value: fmt(savings), delta: savingsPct + '% of income saved', cls: savings >= 0 ? 'green' : 'red', deltaClass: savings >= 0 ? 'up' : 'down' },
    { label: 'Savings Rate', value: savingsPct + '%', delta: savingsPct >= 20 ? '✓ Healthy' : '⚠ Below 20%', cls: savingsPct >= 20 ? 'green' : 'yellow', deltaClass: savingsPct >= 20 ? 'up' : '' }
  ];
  grid.innerHTML = items.map(it => `
    <div class="kpi-card ${it.cls}">
      <div class="kpi-label">${it.label}</div>
      <div class="kpi-value">${it.value}</div>
      <div class="kpi-delta ${it.deltaClass || ''}">${it.delta}</div>
    </div>
  `).join('');
}

function renderInsights(catMap, expenses, savingsPct, expDelta, prevRows, currentRows) {
  const insights = [];

  // Biggest category
  const sorted = Object.entries(catMap).sort((a,b) => b[1]-a[1]);
  if (sorted.length > 0) {
    const [top, amt] = sorted[0];
    const pct = ((amt/expenses)*100).toFixed(0);
    insights.push({ icon: '🔍', text: `<strong>${top}</strong> is your biggest spend this month at <strong>${fmt(amt)}</strong> (${pct}% of total expenses). Consider reviewing if this aligns with your budget.` });
  }

  // Savings advice
  if (savingsPct < 20) {
    insights.push({ icon: '💡', text: `Your savings rate is <strong>${savingsPct}%</strong>, below the recommended 20%. Cutting back on <strong>${sorted[0]?.[0] || 'discretionary'}</strong> spending could help you reach that target.` });
  } else {
    insights.push({ icon: '✅', text: `Great job! You're saving <strong>${savingsPct}%</strong> of your income — above the healthy 20% threshold. Consider investing the surplus for long-term growth.` });
  }

  // Month comparison
  if (expDelta > 15) {
    insights.push({ icon: '⚠️', text: `Spending jumped <strong>${expDelta}%</strong> compared to last month. Identify one-time expenses vs recurring ones to understand the spike.` });
  } else if (expDelta < -10) {
    insights.push({ icon: '📉', text: `Spending dropped <strong>${Math.abs(expDelta)}%</strong> vs last month. You're on track with your budget!` });
  }

  const container = document.getElementById('insights-container');
  container.innerHTML = insights.map(i => `
    <div class="insight-box">
      <div class="insight-icon">${i.icon}</div>
      <div class="insight-text">${i.text}</div>
    </div>
  `).join('');
}

function renderDonut(catMap) {
  const labels = Object.keys(catMap);
  const vals = Object.values(catMap);
  const colors = labels.map(l => CATEGORY_COLORS[l] || '#9ca3af');

  if (donutChartInst) donutChartInst.destroy();
  const ctx = document.getElementById('donutChart').getContext('2d');
  donutChartInst = new Chart(ctx, {
    type: 'doughnut',
    data: { labels, datasets: [{ data: vals, backgroundColor: colors, borderWidth: 0, hoverOffset: 8 }] },
    options: {
      cutout: '68%',
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#1a2235',
          borderColor: 'rgba(255,255,255,0.1)',
          borderWidth: 1,
          titleColor: '#e8eaf0',
          bodyColor: '#6b7280',
          callbacks: { label: ctx => ` ${ctx.label}: ₹${Math.round(ctx.raw).toLocaleString('en-IN')}` }
        }
      }
    }
  });
}

function renderCatList(catMap, total) {
  const sorted = Object.entries(catMap).sort((a,b) => b[1]-a[1]);
  const max = sorted[0]?.[1] || 1;
  const list = document.getElementById('cat-list');
  list.innerHTML = sorted.map(([cat, amt], i) => {
    const pct = ((amt/total)*100).toFixed(1);
    const barPct = ((amt/max)*100).toFixed(0);
    const color = CATEGORY_COLORS[cat] || '#9ca3af';
    return `
      <li class="category-item" style="animation-delay:${i*0.05}s">
        <div class="cat-left">
          <div class="cat-dot" style="background:${color}"></div>
          <div class="cat-name">${cat}</div>
        </div>
        <div class="cat-bar-wrap"><div class="cat-bar" style="width:${barPct}%;background:${color}"></div></div>
        <div class="cat-amount">${fmt(amt)}<span class="cat-pct">${pct}%</span></div>
      </li>
    `;
  }).join('');
}

function renderTransactions(rows) {
  const recent = [...rows].sort((a,b) => new Date(b.Date)-new Date(a.Date)).slice(0, 12);
  const body = document.getElementById('txn-body');
  body.innerHTML = recent.map(r => {
    const cat = r.Category || 'Other';
    const color = CATEGORY_COLORS[cat] || '#9ca3af';
    const bg = CAT_BG[cat] || 'rgba(156,163,175,0.12)';
    const isCredit = r.Amount > 0;
    const d = new Date(r.Date);
    const dateStr = d.toLocaleDateString('en-IN', { day:'2-digit', month:'short' });
    return `
      <tr>
        <td class="txn-date">${dateStr}</td>
        <td style="font-size:13px;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.Description || '—'}</td>
        <td><span class="txn-cat-badge" style="color:${color};background:${bg}">${cat}</span></td>
        <td class="txn-amount ${isCredit ? 'credit' : 'debit'}" style="text-align:right">${isCredit ? '+' : ''}${fmt(r.Amount)}</td>
      </tr>
    `;
  }).join('');
}

function renderLine(rows, y, m) {
  // Group by month
  const monthMap = {};
  rows.filter(r => r.Amount < 0).forEach(r => {
    const key = r.Date?.substring(0,7);
    if (!key) return;
    monthMap[key] = (monthMap[key] || 0) + Math.abs(r.Amount);
  });
  const months = Object.keys(monthMap).sort();
  const labels = months.map(k => {
    const [yr, mo] = k.split('-');
    return new Date(yr, mo-1).toLocaleString('default', { month: 'short', year: '2-digit' });
  });
  const vals = months.map(k => Math.round(monthMap[k]));

  if (lineChartInst) lineChartInst.destroy();
  const ctx = document.getElementById('lineChart').getContext('2d');

  const grad = ctx.createLinearGradient(0, 0, 0, 240);
  grad.addColorStop(0, 'rgba(0,229,180,0.3)');
  grad.addColorStop(1, 'rgba(0,229,180,0)');

  lineChartInst = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        label: 'Expenses',
        data: vals,
        borderColor: '#00e5b4',
        backgroundColor: grad,
        borderWidth: 2,
        pointBackgroundColor: '#00e5b4',
        pointRadius: 4,
        pointHoverRadius: 6,
        fill: true,
        tension: 0.4
      }]
    },
    options: {
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#1a2235',
          borderColor: 'rgba(255,255,255,0.1)',
          borderWidth: 1,
          titleColor: '#e8eaf0',
          bodyColor: '#6b7280',
          callbacks: { label: ctx => ` ₹${ctx.raw.toLocaleString('en-IN')}` }
        }
      },
      scales: {
        x: { grid: { color: 'rgba(255,255,255,0.04)' }, ticks: { color: '#6b7280', font: { family: 'DM Mono', size: 11 } } },
        y: { grid: { color: 'rgba(255,255,255,0.04)' }, ticks: { color: '#6b7280', font: { family: 'DM Mono', size: 11 }, callback: v => '₹' + (v/1000).toFixed(0) + 'k' } }
      }
    }
  });
}
